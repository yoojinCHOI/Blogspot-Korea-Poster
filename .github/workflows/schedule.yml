name: Daily Blogspot Auto Poster

on:
  schedule:
    # Runs at 12:40 UTC (9:40 PM KST) every day
    - cron: '40 12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-auto-poster:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create API & OAuth credentials securely from GitHub Secrets
      run: |
        echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
        echo '${{ secrets.TOKEN_JSON }}' > token.json

    - name: Run Auto Poster Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
      run: |
        python main.py
